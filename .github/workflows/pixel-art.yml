name: Generate Pixel Art Contributions

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run pixel generator
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_USERNAME: ${{ vars.GITHUB_USERNAME }}
        run: node pixel-generate.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pixel-contributions.svg pixel-contributions-dark.svg
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update pixel art contributions"
            git push
          fi
